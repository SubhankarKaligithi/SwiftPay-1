server:
  port: 8081

spring:
  application:
    name: gateway-service

  datasource:
    url: jdbc:postgresql://localhost:5433/swiftpay
    username: postgres
    password: user


  jpa:
      hibernate:
        ddl-auto: update
      properties:
        hibernate:
          jdbc:
            time_zone: UTC
      show-sql: true

  data:
    redis:
      host: localhost
      port: 6379


  kafka:
      bootstrap-servers: localhost:9092

      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
management:
  endpoints:
    web:
      exposure:
        include: health,info

